<!-- ===============ini itu experimen============= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eksperimen Gabung Baris Kolom</title>
    <style>
        .container {
            display: grid;
            /* Cetakan: 3 Kolom dan 3 Baris sama rata */
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 120px); 
            grid-gap: 15px;
            background-color: yellow;
            padding: 20px;
        }

        .box {
            background-color: aqua;
            border: 2px solid blue;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 🌟 KOTAK RAKSASA (Kiri Atas) */
        .kotak-raksasa {
            background-color: lightgreen;
            /* Menggabungkan Kolom 1 & 2 */
            grid-column: 1 / span 2; 
            /* Menggabungkan Baris 1 & 2 */
            grid-row: 1 / span 2;    
        }

        /* 🌟 KOTAK TEGAK (Kanan Bawah) */
        .kotak-tegak {
            background-color: lightcoral;
            /* Tetap di kolom 3 */
            grid-column: 3;          
            /* Menggabungkan Baris 2 & 3 */
            grid-row: 2 / span 2;    
        }
    </style>
</head>
<body>

    <h2>Eksperimen Gabung Kolom & Baris Sekaligus</h2>
    <div class="container">
        <div class="box kotak-raksasa">Kotak 1 (Kolom 1-2 & Baris 1-2)</div>
        <div class="box">Sisa Baris 1 Kolom 3</div>
        <div class="box kotak-tegak">Kotak 2 (Kolom 3 & Baris 2-3)</div>
        
        <div class="box">Sisa Baris 3 Kolom 1</div>
        <div class="box">Sisa Baris 3 Kolom 2</div>
    </div>

</body>
</html>
